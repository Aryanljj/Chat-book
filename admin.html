<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - RAJA VIP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{background:#0a0e1a;color:white;font-family:Arial;padding:20px;}
        .card{background:#1e2a3a;padding:20px;border-radius:15px;margin-bottom:20px;}
        button{background:#ffd400;padding:8px 15px;border:none;border-radius:8px;cursor:pointer;}
        input{padding:10px;margin:10px 0;width:100%;border-radius:8px;border:none;}
        table{width:100%;border-collapse:collapse;}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #333;}
        th{background:#ffd400;color:#1456db;}
        .tab{background:#333;padding:10px 20px;display:inline-block;border-radius:10px;cursor:pointer;margin-right:10px;}
        .tab.active{background:#ffd400;color:#1456db;}
        .hidden{display:none;}
    </style>
</head>
<body>
<h1>👑 RAJA VIP - Admin Panel</h1>
<div>
    <span class="tab active" onclick="showTab('users')">👥 Users</span>
    <span class="tab" onclick="showTab('deposits')">💰 Deposits</span>
    <span class="tab" onclick="showTab('withdraws')">💸 Withdraws</span>
    <span class="tab" onclick="showTab('add')">➕ Add Balance</span>
</div>

<div id="usersTab" class="card">
    <h2>All Users</h2>
    <div id="usersList"></div>
</div>

<div id="depositsTab" class="card hidden">
    <h2>Deposit Requests</h2>
    <div id="depositsList"></div>
</div>

<div id="withdrawsTab" class="card hidden">
    <h2>Withdraw Requests</h2>
    <div id="withdrawsList"></div>
</div>

<div id="addTab" class="card hidden">
    <h2>Add Balance Manually</h2>
    <input type="text" id="phone" placeholder="User Phone Number">
    <input type="number" id="amount" placeholder="Amount to Add">
    <button onclick="addBalance()">Add Balance</button>
</div>

<script>
function getUsers(){return JSON.parse(localStorage.getItem("users")||"{}");}
function saveUsers(u){localStorage.setItem("users",JSON.stringify(u));}
function getDeposits(){return JSON.parse(localStorage.getItem("depositRequests")||"[]");}
function saveDeposits(d){localStorage.setItem("depositRequests",JSON.stringify(d));}
function getWithdraws(){return JSON.parse(localStorage.getItem("withdrawRequests")||"[]");}
function saveWithdraws(w){localStorage.setItem("withdrawRequests",JSON.stringify(w));}

function showTab(t){
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    event.target.classList.add("active");
    document.getElementById("usersTab").classList.add("hidden");
    document.getElementById("depositsTab").classList.add("hidden");
    document.getElementById("withdrawsTab").classList.add("hidden");
    document.getElementById("addTab").classList.add("hidden");
    document.getElementById(t+"Tab").classList.remove("hidden");
    if(t=="users") loadUsers();
    if(t=="deposits") loadDeposits();
    if(t=="withdraws") loadWithdraws();
}

function loadUsers(){
    let u=getUsers(), html="<table><tr><th>Phone</th><th>Balance</th><th>Action</th></tr>";
    for(let p in u) html+=`<tr><td>${p}</td><td>₹${u[p].balance||0}</td><td><button onclick="edit('${p}')">Edit</button></td></tr>`;
    html+="</table>";
    document.getElementById("usersList").innerHTML=html;
}
function edit(p){
    let amt=prompt("Enter new balance for "+p);
    if(amt){let u=getUsers(); u[p].balance=parseFloat(amt); saveUsers(u); loadUsers(); alert("Updated!");}
}

function loadDeposits(){
    let d=getDeposits(), html="<table><tr><th>User</th><th>Amount</th><th>UTR</th><th>Action</th></tr>";
    d.forEach((x,i)=>{if(x.status=="pending") html+=`<tr><td>${x.phone}</td><td>₹${x.amount}</td><td>${x.utr||"N/A"}</td><td><button onclick="approveDeposit(${i})">Approve</button></td>`;});
    html+="</table>";
    document.getElementById("depositsList").innerHTML=html;
}
function approveDeposit(i){
    let d=getDeposits(), r=d[i], u=getUsers();
    if(u[r.phone]) u[r.phone].balance=(u[r.phone].balance||0)+r.amount;
    r.status="approved";
    saveUsers(u); saveDeposits(d);
    loadDeposits(); loadUsers();
    alert("✅ Deposit approved!");
}

function loadWithdraws(){
    let w=getWithdraws(), html="<table><tr><th>User</th><th>Amount</th><th>Bank</th><th>Action</th></tr>";
    w.forEach((x,i)=>{if(x.status=="pending") html+=`<tr><td>${x.phone}</td><td>₹${x.amount}</td><td>${x.bank||"N/A"}</td><td><button onclick="approveWithdraw(${i})">Approve</button> <button onclick="rejectWithdraw(${i})">Reject</button></td>`;});
    html+="</table>";
    document.getElementById("withdrawsList").innerHTML=html;
}
function approveWithdraw(i){
    let w=getWithdraws(); w[i].status="approved"; saveWithdraws(w);
    loadWithdraws(); alert("✅ Withdraw approved!");
}
function rejectWithdraw(i){
    let w=getWithdraws(), r=w[i], u=getUsers();
    if(u[r.phone]) u[r.phone].balance=(u[r.phone].balance||0)+r.amount;
    r.status="rejected";
    saveUsers(u); saveWithdraws(w);
    loadWithdraws(); loadUsers();
    alert("❌ Withdraw rejected! Balance refunded.");
}
function addBalance(){
    let p=document.getElementById("phone").value, a=parseFloat(document.getElementById("amount").value);
    if(!p||!a){alert("Enter phone and amount");return;}
    let u=getUsers();
    if(!u[p]){alert("User not found");return;}
    u[p].balance=(u[p].balance||0)+a;
    saveUsers(u);
    alert(`✅ ₹${a} added to ${p}`);
    document.getElementById("phone").value=""; document.getElementById("amount").value="";
    loadUsers();
}
loadUsers();
</script>
</body>
</html>
